repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.3
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --disable-error-code=import-untyped, --disable-error-code=attr-defined]
        files: ^backend/

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest backend/tests/ -x -q
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: frontend-lint
        name: frontend lint
        entry: cmd.exe /c "cd frontend && npm run lint"
        language: system
        pass_filenames: false
        stages: [pre-push]
