steps:
  # 1 — Install dependencies
  - name: 'node:22-alpine'
    id: install
    entrypoint: npm
    args: ['ci', '--legacy-peer-deps']

  # 2 — Run unit tests (fail fast)
  - name: 'node:22-alpine'
    id: test
    waitFor: ['install']
    entrypoint: npm
    args: ['test']

  # 3 — Build the Vite bundle
  #     Inject Supabase env vars from Secret Manager at build time
  - name: 'node:22-alpine'
    id: build
    waitFor: ['test']
    entrypoint: npm
    args: ['run', 'build']
    secretEnv: ['VITE_SUPABASE_URL', 'VITE_SUPABASE_ANON_KEY']

  # 4 — Build + push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: docker-build
    waitFor: ['build']
    args:
      - build
      - -t
      - 'gcr.io/$PROJECT_ID/civicpath:$COMMIT_SHA'
      - -t
      - 'gcr.io/$PROJECT_ID/civicpath:latest'
      - .

  # 5 — Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    waitFor: ['docker-build']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - civicpath
      - --image=gcr.io/$PROJECT_ID/civicpath:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=3
      - --memory=512Mi
      - --cpu=1
      - --port=8080

# Secret Manager integration (Supabase keys, non-sensitive public keys)
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/VITE_SUPABASE_URL/versions/latest
      env: 'VITE_SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/VITE_SUPABASE_ANON_KEY/versions/latest
      env: 'VITE_SUPABASE_ANON_KEY'

images:
  - 'gcr.io/$PROJECT_ID/civicpath:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/civicpath:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
